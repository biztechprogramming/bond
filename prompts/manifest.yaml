# prompts/manifest.yaml
#
# Fragment selection manifest for the three-tier prompt system (Doc 027).
#
# Tier 1 (always-on): concatenated into the system prompt every turn
# Tier 2 (lifecycle):  injected when the agent enters a specific work phase
# Tier 3 (context):    selected by semantic router based on user message
#
# Files not listed here are not loaded by the selection system.
# agent.system.main.md is the base system prompt — it is NOT a fragment.

# ══════════════════════════════════════════════════════════════════════════
# Tier 1: Always On
# ══════════════════════════════════════════════════════════════════════════
# Concatenated into the system prompt at runtime. No selection logic.

universal/safety.md:
  tier: 1

universal/memory-guidance.md:
  tier: 1

universal/tool-efficiency.md:
  tier: 1

universal/proactive-workflow.md:
  tier: 1

universal/act-before-responding.md:
  tier: 1

universal/message-handling.md:
  tier: 1

# Demoted from Tier 1 — only needed during active work phases
universal/reasoning.md:
  tier: 2
  phase: implementing

universal/error-handling.md:
  tier: 2
  phase: implementing

universal/work-planning.md:
  tier: 2
  phase: planning

engineering/code-quality/must-compile/must-compile.md:
  tier: 2
  phase: implementing

# ══════════════════════════════════════════════════════════════════════════
# Tier 2: Lifecycle-Triggered
# ══════════════════════════════════════════════════════════════════════════
# Injected when the agent enters the specified work phase.
# Phase detection based on tool call observation (doc 024).
# Phases: implementing, committing, reviewing, planning

