version: "3.8"

services:
  backend:
    build:
      context: .
      target: backend-base
    command: uv run uvicorn backend.app.main:app --host 0.0.0.0 --port 18790 --reload
    ports:
      - "18790:18790"
    volumes:
      - .:/app
      - bond-data:/home/bond/.bond
    environment:
      - BOND_HOME=/home/bond/.bond
      - PYTHONPATH=/app
      - SPACETIMEDB_TOKEN=${SPACETIMEDB_TOKEN:-}

  gateway:
    build:
      context: .
      target: backend-base
    command: sh -c "cd gateway && pnpm dev"
    ports:
      - "18789:18789"
    volumes:
      - ./gateway:/app/gateway
      - bond-data:/home/bond/.bond
    environment:
      - BOND_BACKEND_URL=http://backend:18790
      - SPACETIMEDB_TOKEN=${SPACETIMEDB_TOKEN:-}
      - GATEWAY_EXTERNAL_URL=${GATEWAY_EXTERNAL_URL:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}

  frontend:
    build:
      context: .
      target: backend-base
    command: sh -c "cd frontend && pnpm dev"
    ports:
      - "18788:18788"
    volumes:
      - ./frontend:/app/frontend

  # OpenSandbox server — sidecar for sandbox execution (Phase 1)
  # Activate with: docker compose --profile opensandbox up
  opensandbox-server:
    build:
      context: ./vendor/OpenSandbox/server
    container_name: bond-opensandbox-server
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SANDBOX_CONFIG_PATH=/etc/opensandbox/config.toml
    configs:
      - source: opensandbox-config
        target: /etc/opensandbox/config.toml
    profiles:
      - opensandbox
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
      - bond-data:/home/bond/.bond/data
    command:
      [
        "-path", "/migrations",
        "-database", "sqlite3:///home/bond/.bond/data/knowledge.db",
        "up"
      ]
    profiles:
      - tools

configs:
  opensandbox-config:
    content: |
      [server]
      host = "0.0.0.0"
      port = 8090
      log_level = "INFO"

      [runtime]
      type = "docker"
      execd_image = "opensandbox/execd:v1.0.6"

      [egress]
      image = "opensandbox/egress:v1.0.1"

      [docker]
      network_mode = "bridge"
      host_ip = "host.docker.internal"
      drop_capabilities = ["AUDIT_WRITE", "MKNOD", "NET_ADMIN", "NET_RAW", "SYS_ADMIN", "SYS_MODULE", "SYS_PTRACE", "SYS_TIME", "SYS_TTY_CONFIG"]
      no_new_privileges = true
      pids_limit = 512

      [ingress]
      mode = "direct"

volumes:
  bond-data:
