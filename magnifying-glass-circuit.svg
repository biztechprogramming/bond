<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <!-- Chrome rim gradient -->
    <linearGradient id="chromeRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="25%" style="stop-color:#f5f5f5"/>
      <stop offset="50%" style="stop-color:#b0b0b0"/>
      <stop offset="75%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#c0c0c0"/>
    </linearGradient>

    <!-- Chrome rim highlight -->
    <linearGradient id="chromeHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3"/>
    </linearGradient>

    <!-- Frosted glass handle gradient -->
    <linearGradient id="frostedHandle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eef5;stop-opacity:0.95"/>
      <stop offset="30%" style="stop-color:#d0d8e5;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#c5cdd8;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#b8c2d0;stop-opacity:0.9"/>
    </linearGradient>

    <!-- Handle highlight -->
    <linearGradient id="handleHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>

    <!-- Lens gradient (subtle blue tint) -->
    <radialGradient id="lensGlass" cx="45%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="40%" style="stop-color:#e0eeff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#c0d8f0;stop-opacity:0.2"/>
    </radialGradient>

    <!-- Lens reflection -->
    <radialGradient id="lensReflection" cx="35%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>

    <!-- Circuit board glow -->
    <radialGradient id="circuitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.4"/>
      <stop offset="60%" style="stop-color:#0088aa;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#004455;stop-opacity:0"/>
    </radialGradient>

    <!-- Gold gradient for B icon -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="25%" style="stop-color:#ffec80"/>
      <stop offset="50%" style="stop-color:#daa520"/>
      <stop offset="75%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>

    <!-- Gold glow -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.6"/>
      <stop offset="60%" style="stop-color:#ffd700;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0"/>
    </radialGradient>

    <!-- Shadow gradient -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
    </radialGradient>

    <!-- Circuit node glow -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for gold -->
    <filter id="goldGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Depth of field blur for background elements -->
    <filter id="dofBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

    <!-- Subtle shadow for magnifying glass -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <!-- Frosted glass texture -->
    <filter id="frostedTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="textured"/>
      <feGaussianBlur in="textured" stdDeviation="0.3"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="1200" height="1200" fill="#ffffff"/>

  <!-- Subtle background gradient for depth -->
  <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
    <stop offset="0%" style="stop-color:#ffffff"/>
    <stop offset="100%" style="stop-color:#f5f5f8"/>
  </radialGradient>
  <rect width="1200" height="1200" fill="url(#bgGrad)"/>

  <!-- Ground shadow -->
  <ellipse cx="520" cy="880" rx="320" ry="60" fill="url(#shadowGrad)" opacity="0.5"/>

  <!-- ==================== CIRCUIT BOARD PATTERN ==================== -->
  <g transform="translate(300, 550) skewX(-15) scale(1, 0.6)" filter="url(#dofBlur)" opacity="0.7">
    <!-- Board base -->
    <rect x="0" y="0" width="440" height="440" rx="12" fill="#0a1628" opacity="0.9"/>

    <!-- Circuit traces - horizontal -->
    <line x1="20" y1="60" x2="420" y2="60" stroke="#00bcd4" stroke-width="1.5" opacity="0.4"/>
    <line x1="40" y1="120" x2="400" y2="120" stroke="#00bcd4" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="180" x2="420" y2="180" stroke="#00bcd4" stroke-width="1.5" opacity="0.4"/>
    <line x1="60" y1="240" x2="380" y2="240" stroke="#00bcd4" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="300" x2="420" y2="300" stroke="#00bcd4" stroke-width="1.5" opacity="0.35"/>
    <line x1="40" y1="360" x2="400" y2="360" stroke="#00bcd4" stroke-width="1" opacity="0.3"/>

    <!-- Circuit traces - vertical -->
    <line x1="80" y1="20" x2="80" y2="420" stroke="#00bcd4" stroke-width="1" opacity="0.3"/>
    <line x1="160" y1="40" x2="160" y2="400" stroke="#00bcd4" stroke-width="1.5" opacity="0.4"/>
    <line x1="220" y1="20" x2="220" y2="420" stroke="#00bcd4" stroke-width="1" opacity="0.35"/>
    <line x1="300" y1="40" x2="300" y2="400" stroke="#00bcd4" stroke-width="1.5" opacity="0.4"/>
    <line x1="360" y1="20" x2="360" y2="420" stroke="#00bcd4" stroke-width="1" opacity="0.3"/>

    <!-- Nodes -->
    <g filter="url(#nodeGlow)">
      <circle cx="80" cy="60" r="4" fill="#00e5ff" opacity="0.7"/>
      <circle cx="160" cy="120" r="4" fill="#00e5ff" opacity="0.7"/>
      <circle cx="300" cy="60" r="4" fill="#00e5ff" opacity="0.6"/>
      <circle cx="360" cy="180" r="4" fill="#00e5ff" opacity="0.7"/>
      <circle cx="80" cy="300" r="4" fill="#00e5ff" opacity="0.6"/>
      <circle cx="220" cy="360" r="4" fill="#00e5ff" opacity="0.7"/>
      <circle cx="360" cy="300" r="4" fill="#00e5ff" opacity="0.6"/>
      <circle cx="160" cy="240" r="4" fill="#00e5ff" opacity="0.7"/>
      <circle cx="300" cy="180" r="3" fill="#00e5ff" opacity="0.5"/>
      <circle cx="80" cy="180" r="3" fill="#00e5ff" opacity="0.5"/>
    </g>

    <!-- IC chips -->
    <rect x="120" y="70" width="40" height="30" rx="2" fill="#1a2a40" stroke="#00bcd4" stroke-width="0.8" opacity="0.6"/>
    <rect x="270" y="140" width="50" height="25" rx="2" fill="#1a2a40" stroke="#00bcd4" stroke-width="0.8" opacity="0.6"/>
    <rect x="100" y="310" width="35" height="35" rx="2" fill="#1a2a40" stroke="#00bcd4" stroke-width="0.8" opacity="0.5"/>
    <rect x="320" y="340" width="45" height="20" rx="2" fill="#1a2a40" stroke="#00bcd4" stroke-width="0.8" opacity="0.5"/>

    <!-- Board glow overlay -->
    <rect x="0" y="0" width="440" height="440" rx="12" fill="url(#circuitGlow)" opacity="0.5"/>
  </g>

  <!-- ==================== MAGNIFIED AREA (under lens) ==================== -->
  <g transform="translate(480, 420)" opacity="0.9">
    <circle r="160" fill="url(#circuitGlow)" opacity="0.3"/>

    <!-- Magnified circuit traces -->
    <g opacity="0.5" filter="url(#softGlow)">
      <line x1="-140" y1="-40" x2="140" y2="-40" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
      <line x1="-140" y1="0" x2="-60" y2="0" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
      <line x1="60" y1="0" x2="140" y2="0" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
      <line x1="-140" y1="40" x2="140" y2="40" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
      <line x1="-140" y1="80" x2="140" y2="80" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
      <line x1="-140" y1="-80" x2="140" y2="-80" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
      <line x1="-100" y1="-120" x2="-100" y2="120" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
      <line x1="-50" y1="-120" x2="-50" y2="120" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
      <line x1="50" y1="-120" x2="50" y2="120" stroke="#00e5ff" stroke-width="2" opacity="0.5"/>
      <line x1="100" y1="-120" x2="100" y2="120" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
    </g>

    <!-- Central golden B node -->
    <g filter="url(#goldGlowFilter)">
      <circle r="55" fill="url(#goldGlow)" opacity="0.6"/>

      <!-- Connecting traces -->
      <line x1="-50" y1="0" x2="-30" y2="0" stroke="#ffd700" stroke-width="2.5" opacity="0.7"/>
      <line x1="30" y1="0" x2="50" y2="0" stroke="#ffd700" stroke-width="2.5" opacity="0.7"/>
      <line x1="0" y1="-50" x2="0" y2="-30" stroke="#ffd700" stroke-width="2.5" opacity="0.7"/>
      <line x1="0" y1="30" x2="0" y2="50" stroke="#ffd700" stroke-width="2.5" opacity="0.7"/>
      <line x1="-35" y1="-35" x2="-22" y2="-22" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
      <line x1="35" y1="-35" x2="22" y2="-22" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
      <line x1="-35" y1="35" x2="-22" y2="22" stroke="#ffd700" stroke-width="2" opacity="0.5"/>
      <line x1="35" y1="35" x2="22" y2="22" stroke="#ffd700" stroke-width="2" opacity="0.5"/>

      <!-- Golden B -->
      <g transform="translate(-18, -24)">
        <text font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="url(#goldGradient)" letter-spacing="-1">B</text>
        <text font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" fill="#ffffff" opacity="0.25" letter-spacing="-1" dy="-1">B</text>
      </g>
    </g>

    <!-- Surrounding magnified nodes -->
    <g filter="url(#nodeGlow)">
      <circle cx="-100" cy="-40" r="5" fill="#00e5ff" opacity="0.8"/>
      <circle cx="100" cy="-40" r="5" fill="#00e5ff" opacity="0.8"/>
      <circle cx="-100" cy="40" r="5" fill="#00e5ff" opacity="0.7"/>
      <circle cx="100" cy="40" r="5" fill="#00e5ff" opacity="0.7"/>
      <circle cx="-50" cy="-80" r="4" fill="#00e5ff" opacity="0.6"/>
      <circle cx="50" cy="-80" r="4" fill="#00e5ff" opacity="0.6"/>
      <circle cx="-50" cy="80" r="4" fill="#00e5ff" opacity="0.6"/>
      <circle cx="50" cy="80" r="4" fill="#00e5ff" opacity="0.6"/>
    </g>
  </g>

  <!-- ==================== MAGNIFYING GLASS ==================== -->
  <g filter="url(#dropShadow)">
    <!-- Handle -->
    <g transform="rotate(35, 480, 420)">
      <rect x="450" y="590" width="60" height="220" rx="30" fill="url(#frostedHandle)" filter="url(#frostedTexture)"/>
      <rect x="458" y="600" width="20" height="200" rx="10" fill="url(#handleHighlight)"/>
      <rect x="450" y="590" width="60" height="220" rx="30" fill="none" stroke="#d0d5dd" stroke-width="1" opacity="0.5"/>
      <rect x="445" y="580" width="70" height="25" rx="12" fill="url(#chromeRim)" stroke="#c0c0c0" stroke-width="0.5"/>
      <ellipse cx="480" cy="810" rx="30" ry="12" fill="url(#chromeRim)" stroke="#c0c0c0" stroke-width="0.5"/>
    </g>

    <!-- Chrome rim -->
    <circle cx="480" cy="420" r="185" fill="none" stroke="url(#chromeRim)" stroke-width="20"/>
    <circle cx="480" cy="420" r="185" fill="none" stroke="url(#chromeHighlight)" stroke-width="18"/>
    <circle cx="480" cy="420" r="176" fill="none" stroke="#b8b8b8" stroke-width="1" opacity="0.5"/>
    <circle cx="480" cy="420" r="194" fill="none" stroke="#d8d8d8" stroke-width="1" opacity="0.5"/>

    <!-- Lens glass -->
    <circle cx="480" cy="420" r="172" fill="url(#lensGlass)"/>
    <ellipse cx="445" cy="370" rx="90" ry="70" fill="url(#lensReflection)" transform="rotate(-20, 445, 370)"/>
    <ellipse cx="540" cy="490" rx="30" ry="15" fill="#ffffff" opacity="0.12" transform="rotate(30, 540, 490)"/>
    <circle cx="480" cy="420" r="172" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- ==================== AMBIENT LIGHT EFFECTS ==================== -->
  <radialGradient id="studioLight1" cx="25%" cy="20%" r="35%">
    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.03"/>
    <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="1200" fill="url(#studioLight1)"/>

  <radialGradient id="studioLight2" cx="80%" cy="30%" r="25%">
    <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:0.04"/>
    <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="1200" fill="url(#studioLight2)"/>
</svg>